
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#1a1a1a;
  --accent:#f97316;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#333;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
}

.container{max-width:1000px;margin:auto;padding:25px;}
.step{display:none;}
.active{display:block;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}

.card{background:white;padding:14px;border-radius:10px;border:1px solid #e5e7eb;}
.card b{display:block;margin-top:6px;}

.precios{margin-top:10px;}
.tag.normal{text-decoration:line-through;color:#9ca3af;}
.tag.masgas{text-decoration:line-through;color:#6b7280;}
.tag.feria{background:#f97316;color:white;padding:3px 6px;border-radius:5px;}

input{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc;}

button{padding:10px;border:none;border-radius:6px;margin-top:10px;cursor:pointer;}
.next{background:#f97316;color:white;}
.back{background:#ddd;}

.total-box{position:fixed;top:10px;right:10px;background:white;padding:10px;border-radius:8px;}
</style>
</head>

<body>

<div class="total-box">Total: $<span id="total">0</span></div>

<div class="container">

<!-- PASO 1 -->
<div class="step active" id="step1">
<h3>Servicios</h3>
<div class="grid" id="listaServicios"></div>
<button class="next" onclick="validar()">Siguiente</button>
</div>

<!-- RESUMEN -->
<div id="resumenBox"></div>

<!-- PASO 2 -->
<div class="step" id="step2">
<h3>Ubicación</h3>

<input id="ubicacion" list="ciudades">

<datalist id="ciudades">
<option value="Quito"><option value="Guayaquil"><option value="Cuenca">
<option value="Ambato"><option value="Latacunga"><option value="Riobamba">
<option value="Santo Domingo"><option value="Otavalo"><option value="Loja">
<option value="Machala"><option value="Puyo"><option value="Lago Agrio">
</datalist>

<button class="back" onclick="next(1)">Anterior</button>
<button class="next" onclick="next(3)">Siguiente</button>
</div>

<!-- PASO 3 -->
<div class="step" id="step3">
<h3>Continuar</h3>
<button class="next" onclick="next(4)">Ingresar datos</button>
</div>

<!-- PASO 4 -->
<div class="step" id="step4">
<h3>Datos del cliente</h3>

<input id="razon" placeholder="Razón Social">
<input id="ruc" placeholder="RUC">
<input id="contacto" placeholder="Persona de contacto">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<button class="back" onclick="next(3)">Anterior</button>
<button class="next" onclick="finalizar()">Finalizar</button>
</div>

</div>

<script>

// SERVICIOS (NO CAMBIADOS)
const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150],
["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90],
["PARÁMETROS DIMENSIONALES",59.5,70,85],
["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85],
["LIMPIEZA  DE TANQUE 5K-12K (CERTIFICADO)",382.5,450,460],
["LIMPIEZA  DE TANQUE 1K-4K (CERTIFICADO)",297.5,350,380],
["CALIBRACIÓN LIQUIDA 5K-12K",408,480,500],
["CALIBRACIÓN LIQUIDA 1K-4K",153,180,200],
["CALIBRACIÓN GEOMÉTRICA 5K-12K",365.5,430,490],
["CALIBRACIÓN GEOMÉTRICA 1K-4K",127.5,150,190],
["MEMORIA TÉCNICA",297.5,350,370],
["CERTIFICACIÓN NTE INEN 1781",63.75,75,90],
["NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465]
];

const cont = document.getElementById("listaServicios");

servicios.forEach(s=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" value="${s[1]}" onchange="total(); actualizarResumen();">
<b>${s[0]}</b>
<div class="precios">
<span class="tag normal">Precio normal: $${s[3]}</span><br>
<span class="tag masgas">Precio cliente MasGas: $${s[2]}</span><br>
<span class="tag feria">Precio feria: $${s[1]}</span>
</div>
</div>`;
});

// TOTAL
function total(){
let t=0;
document.querySelectorAll("input:checked").forEach(c=>t+=parseFloat(c.value));
document.getElementById("total").innerText=t.toFixed(2);
}

// LOGÍSTICA
function calcularLogistica(u){
u=u.toLowerCase();
if(u.includes("quito")) return 131;
if(u.includes("guayaquil")) return 147;
return 140;
}

// RESUMEN
function actualizarResumen(){
let normal=0, masgas=0, feria=0, lista=[];

document.querySelectorAll("input:checked").forEach(c=>{
let p=c.parentElement.querySelectorAll(".tag");
normal+=parseFloat(p[0].innerText.replace(/[^0-9.]/g,""));
masgas+=parseFloat(p[1].innerText.replace(/[^0-9.]/g,""));
feria+=parseFloat(p[2].innerText.replace(/[^0-9.]/g,""));
lista.push("• "+c.parentElement.querySelector("b").innerText);
});

let u=document.getElementById("ubicacion").value;
let log=0;

if(u){
log=calcularLogistica(u);
normal+=log; masgas+=log; feria+=log;
}

document.getElementById("resumenBox").innerHTML=`
<h4>Resumen</h4>
${lista.join("<br>") || "—"}<br><br>
${u ? `<b>Logística:</b> $${log}<br><small>* Precio por día</small><br><br>`:""}
Normal: $${normal.toFixed(2)}<br>
MasGas: $${masgas.toFixed(2)}<br>
<b style="color:#f97316;">Feria: $${feria.toFixed(2)}</b><br>
<b style="color:green;">Ahorro: $${(normal-feria).toFixed(2)}</b>
`;
}

// NAVEGACIÓN
function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
actualizarResumen();
}

function validar(){
if(!document.querySelector("input:checked")){
alert("Selecciona al menos un servicio");return;
}
next(2);
}

// FINALIZAR
function finalizar(){

let datos={
razon:razon.value,
ruc:ruc.value,
contacto:contacto.value,
direccion:direccion.value,
telefono:telefono.value,
correo:correo.value
};

generarPDF(datos);
whatsapp(datos);
}

// PDF
function generarPDF(d){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

let txt=document.getElementById("resumenBox").innerText;

doc.text("COTIZACIÓN PETROCHECK",10,10);

doc.text(`Cliente: ${d.razon}`,10,20);
doc.text(`RUC: ${d.ruc}`,10,25);
doc.text(`Contacto: ${d.contacto}`,10,30);
doc.text(`Dirección: ${d.direccion}`,10,35);
doc.text(`Teléfono: ${d.telefono}`,10,40);
doc.text(`Correo: ${d.correo}`,10,45);

doc.text(txt,10,55);

doc.save("cotizacion.pdf");
}

// WHATSAPP
function whatsapp(d){
let txt=document.getElementById("resumenBox").innerText;

let msg=`COTIZACIÓN PETROCHECK

${d.razon}
${d.ruc}
${d.contacto}
${d.direccion}
${d.telefono}
${d.correo}

${txt}`;

window.open("https://wa.me/593XXXXXXXXX?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
