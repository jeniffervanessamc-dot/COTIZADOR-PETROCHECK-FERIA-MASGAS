<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:url('https://petrocheck.com.ec/wp-content/uploads/2021/11/calidad-home.jpg') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{max-width:1100px;margin:auto;padding:25px;}
.header{text-align:center;margin-bottom:20px;}
.header img{height:70px;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:15px;}

.card{
  background:white;
  padding:16px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.cantidad-box{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:8px;
}
.cantidad-box button{
  width:30px;height:30px;
  background:#f97316;color:white;border:none;border-radius:6px;
}
.cantidad-box input{
  width:50px;text-align:center;
}

.resumen{
  background:white;padding:15px;border-radius:10px;margin-top:20px;
}

button{
  padding:12px;border:none;border-radius:8px;
  background:#f97316;color:white;cursor:pointer;margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://petrocheck.com.ec/wp-content/uploads/2021/09/logo_oscuro.png">
</div>

<h3 style="color:white">Servicios</h3>
<div class="grid" id="listaServicios"></div>

<h3 style="color:white">Ubicación</h3>
<input id="ubicacion" placeholder="Ej: Quito" oninput="actualizarResumen()">

<h3 style="color:white">Datos del cliente</h3>
<input id="razon" placeholder="Razón Social">
<input id="ruc" placeholder="RUC">
<input id="contacto" placeholder="Contacto">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<div id="resumen" class="resumen"></div>

<button onclick="enviarTodo()">ENVIAR COTIZACIÓN</button>

</div>

<script>

(function(){
emailjs.init("TU_PUBLIC_KEY");
})();

const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150],
["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90],
["PARÁMETROS DIMENSIONALES",59.5,70,85],
["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",382.5,450,460],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",297.5,350,380],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",408,480,500],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",153,180,200],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",365.5,430,490],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL HASTA (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",127.5,150,190],
["MEMORIA TÉCNICA",297.5,350,370],
["CERTIFICACIÓN DE SURTIDORES NTE INEN 1781",63.75,75,90],
["CUMPLIMIENTO DE NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465]
];

const cont=document.getElementById("listaServicios");

servicios.forEach((s,i)=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" id="check${i}" onchange="actualizarResumen()">
<b>${s[0]}</b>

<div class="cantidad-box">
<button onclick="cambiar(${i},-1)">-</button>
<input id="cant${i}" value="1">
<button onclick="cambiar(${i},1)">+</button>
</div>

</div>`;
});

function cambiar(i,c){
let x=document.getElementById("cant"+i);
let v=parseInt(x.value)||1;
v+=c;
if(v<1)v=1;
x.value=v;
actualizarResumen();
}

function actualizarResumen(){
let total=0;
let lista=[];

servicios.forEach((s,i)=>{
let check=document.getElementById("check"+i);
let cant=parseInt(document.getElementById("cant"+i).value)||1;

if(check.checked){
total+=s[1]*cant;
lista.push(`${s[0]} x${cant}`);
}
});

document.getElementById("resumen").innerText=
"Servicios:\n"+lista.join("\n")+
"\n\nTotal: $"+total;
}

function enviarTodo(){

let mensaje=document.getElementById("resumen").innerText;

emailjs.send("TU_SERVICE_ID","TU_TEMPLATE_ID",{
to_email:"contacto@petrocheck.com.ec",
message:mensaje,
cliente:razon.value,
ruc:ruc.value,
telefono:telefono.value
});

alert("Cotización enviada al correo");
}

</script>

</body>
</html>
