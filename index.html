
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck PRO</title>

<style>
:root{
  --negro:#0d0d0d;
  --gris:#f4f6f8;
  --naranja:#ff6a00;
  --texto:#2c2c2c;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--gris);
  color:var(--texto);
}

/* HEADER */
header{
  background:linear-gradient(90deg,#0d0d0d,#1a1a1a);
  padding:25px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.logo{
  width:200px;
}

/* CONTENEDOR */
.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
}

/* TITULOS */
h2{
  margin-bottom:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* TARJETAS */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:all 0.25s ease;
  border:1px solid #eee;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

/* PRECIOS */
.normal{
  text-decoration:line-through;
  color:#999;
  font-size:13px;
}

.masgas{
  text-decoration:line-through;
  color:#bbb;
  font-size:13px;
}

.feria{
  color:var(--naranja);
  font-weight:bold;
  font-size:16px;
  margin-top:5px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  transition:0.2s;
}

input:focus{
  border-color:var(--naranja);
  outline:none;
}

/* BOTONES */
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:var(--naranja);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#e65c00;
}

/* TOTAL */
.total-box{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,#111,#222);
  color:white;
  padding:18px;
  border-radius:12px;
  font-size:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* ERRORES */
.error{
  color:#d32f2f;
  font-size:13px;
}
</style>
</head>

<body>

<header>
<img src="https://petrocheck.com.ec/wp-content/uploads/2023/07/logo-petrocheck.png" class="logo">
</header>

<div class="container">

<h2>Selecciona los servicios</h2>

<div class="grid">

<!-- SERVICIO EJEMPLO -->
<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Oil_storage_tanks.jpg">
<div class="card-content">
<input type="checkbox" value="102">
<b>Pruebas de hermeticidad en tanques</b>
<div class="normal">Precio normal: $150</div>
<div class="masgas">Precio cliente MasGas: $120</div>
<div class="feria">Precio feria: $102</div>
</div>
</div>

<!-- DUPLICA ESTE BLOQUE PARA LOS DEMÁS SERVICIOS -->

</div>

<div class="error" id="errorServicios"></div>

<button onclick="validarServicios()">Siguiente</button>

<h2>Ubicación</h2>
<input id="ubicacion" placeholder="Ingrese ciudad">

<h2>Datos</h2>
<input id="razon" placeholder="Razón Social">
<input id="telefono" placeholder="Teléfono">

</div>

<div class="total-box">
TOTAL: $<span id="total">0</span>
</div>

<script>

function actualizarTotal(){
let total=0;
document.querySelectorAll("input[type=checkbox]:checked").forEach(c=>{
total+=parseFloat(c.value);
});
document.getElementById("total").innerText=total;
}

document.addEventListener("change",actualizarTotal);

function validarServicios(){
if(document.querySelectorAll("input:checked").length==0){
document.getElementById("errorServicios").innerText="Seleccione al menos un servicio";
return;
}
alert("OK");
}

</script>

</body>
</html>
