
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --primary:#1a1a1a;
  --accent:#f97316;
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#333;
}
body{margin:0;font-family:'Segoe UI';background:var(--bg);}
.container{max-width:1000px;margin:auto;padding:25px;}
.step{display:none;} .active{display:block;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}

.card{background:white;padding:14px;border-radius:10px;border:1px solid #e5e7eb;}
.card b{display:block;margin-top:6px;}

.tag.normal{text-decoration:line-through;color:#9ca3af;}
.tag.masgas{text-decoration:line-through;color:#6b7280;}
.tag.feria{background:#f97316;color:white;padding:4px 8px;border-radius:6px;}

input{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc;}

.botones{display:flex;gap:10px;margin-top:15px;}
button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;}
.next{background:#f97316;color:white;}
.back{background:#ddd;}

.total-box{position:fixed;top:15px;right:15px;background:white;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<div class="total-box">Total: $<span id="total">0.00</span></div>

<div class="container">

<!-- PASO 1 -->
<div class="step active" id="step1">
<h3>Servicios</h3>
<div class="grid" id="listaServicios"></div>
<div class="botones">
<button class="next" onclick="validar()">Siguiente</button>
</div>
</div>

<!-- RESUMEN -->
<div id="resumenBox" style="margin-top:20px;background:white;padding:15px;border-radius:10px;border:1px solid #e5e7eb;"></div>

<!-- PASO 2 -->
<div class="step" id="step2">
<h3>Ubicación</h3>

<input id="ubicacion" list="ciudades" placeholder="Ej: Quito">
<datalist id="ciudades">
<option value="Quito"><option value="Guayaquil"><option value="Cuenca">
<option value="Ambato"><option value="Latacunga"><option value="Riobamba">
<option value="Santo Domingo"><option value="Otavalo"><option value="Loja">
<option value="Machala"><option value="Puyo"><option value="Lago Agrio">
</datalist>

<div class="botones">
<button class="back" onclick="next(1)">Anterior</button>
<button class="next" onclick="next(3)">Siguiente</button>
</div>
</div>

<!-- PASO 3 -->
<div class="step" id="step3">
<h3>Datos del cliente</h3>

<input id="razon" placeholder="Razón Social">
<input id="ruc" placeholder="RUC">
<input id="contacto" placeholder="Persona de contacto">
<input id="direccion" placeholder="Dirección">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo">

<div class="botones">
<button class="back" onclick="next(2)">Anterior</button>
<button class="next" onclick="next(4)">Continuar</button>
</div>
</div>

<!-- PASO FINAL -->
<div class="step" id="step4">
<h3>Finalizar</h3>

<div class="botones">
<button onclick="generarPDF()">📄 Descargar PDF</button>
<button onclick="enviarWhatsApp()">📲 Enviar WhatsApp</button>
</div>
</div>

</div>

<script>

// SERVICIOS (NO MODIFICADOS)
const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150], ["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90], ["PARÁMETROS DIMENSIONALES",59.5,70,85], ["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85], ["LIMPIEZA DE TANQUE CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",382.5,450,460], ["LIMPIEZA DE TANQUE CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",297.5,350,380], ["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",408,480,500], ["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",153,180,200], ["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",365.5,430,490], ["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL HASTA (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",127.5,150,190], ["MEMORIA TÉCNICA",297.5,350,370], ["CERTIFICACIÓN DE SURTIDORES NTE INEN 1781",63.75,75,90], ["CUMPLIMIENTO DE NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465] ];
  const cont=document.getElementById("listaServicios");

servicios.forEach(s=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" value="${s[1]}" onchange="total(); actualizarResumen();">
<b>${s[0]}</b>
<div class="precios">
<span class="tag normal">Precio normal: $${s[3]}</span><br>
<span class="tag masgas">Precio cliente MasGas: $${s[2]}</span><br>
<span class="tag feria">Precio feria: $${s[1]}</span>
</div>
</div>`;
});

// TOTAL
function total(){
let t=0;
document.querySelectorAll("input:checked").forEach(c=>t+=parseFloat(c.value));
document.getElementById("total").innerText=t.toFixed(2);
}

// LOGÍSTICA
function calcularLogistica(u){
u=u.toLowerCase();
if(u.includes("quito")) return 131;
if(u.includes("guayaquil")) return 147;
return 140;
}

// RESUMEN
function actualizarResumen(){
let normal=0, masgas=0, feria=0, lista=[];

document.querySelectorAll("input:checked").forEach(c=>{
let p=c.parentElement.querySelectorAll(".tag");
normal+=parseFloat(p[0].innerText.replace(/[^0-9.]/g,""));
masgas+=parseFloat(p[1].innerText.replace(/[^0-9.]/g,""));
feria+=parseFloat(p[2].innerText.replace(/[^0-9.]/g,""));
lista.push("• "+c.parentElement.querySelector("b").innerText);
});

let u=document.getElementById("ubicacion").value;
let log=0;

if(u){
log=calcularLogistica(u);
normal+=log; masgas+=log; feria+=log;
}

document.getElementById("resumenBox").innerHTML=`
<h4>Resumen</h4>

${lista.join("<br>") || "—"}<br><br>

${u ? `<b>Logística:</b> $${log}<br><small>* Precio por día</small><br><br>`:""}

<b>Total normal:</b> $${normal.toFixed(2)}<br>
<b>Total MasGas:</b> $${masgas.toFixed(2)}<br>
<b style="color:#f97316;">Total feria:</b> $${feria.toFixed(2)}<br><br>

<b style="color:#16a34a;">Ahorro:</b> $${(normal-feria).toFixed(2)}<br><br>

<b style="font-size:12px;color:#6b7280;">Validez de la oferta: 10 días</b>
`;
}

// NAVEGACIÓN
function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
actualizarResumen();
}

function validar(){
if(!document.querySelector("input:checked")){
alert("Selecciona al menos un servicio");return;
}
next(2);
}

// PDF
function generarPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

let txt=document.getElementById("resumenBox").innerText;

doc.text("COTIZACIÓN PETROCHECK",10,10);
doc.text(txt,10,20);

doc.save("cotizacion.pdf");
}

// WHATSAPP
function enviarWhatsApp(){
let txt=document.getElementById("resumenBox").innerText;
window.open("https://wa.me/593999300398?text="+encodeURIComponent(txt));
}

</script>

</body>
</html>
