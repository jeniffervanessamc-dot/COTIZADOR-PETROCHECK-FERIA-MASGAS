<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{ --accent:#f97316; }

body{
  margin:0;
  font-family:'Segoe UI';
  background:url('https://petrocheck.com.ec/wp-content/uploads/2021/11/calidad-home.jpg') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{max-width:1100px;margin:auto;padding:25px;}
.header{text-align:center;margin-bottom:20px;}
.header img{height:70px;}

.step{display:none;}
.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:16px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* CANTIDAD PRO */
.cantidad-box{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  margin-top:8px;
}
.cantidad-box button{
  width:30px;
  height:30px;
  border:none;
  border-radius:6px;
  background:#f97316;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.cantidad-box input{
  width:50px;
  text-align:center;
  border:1px solid #ccc;
  border-radius:6px;
}

.tag{display:block;font-size:13px;}
.normal{text-decoration:line-through;color:#aaa;}
.masgas{color:#555;}
.feria{background:#f97316;color:white;padding:3px;border-radius:5px;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.botones{display:flex;gap:10px;margin-top:15px;}
button{flex:1;padding:12px;border:none;border-radius:8px;cursor:pointer;}
.next{background:#f97316;color:white;}
.back{background:#ccc;}

.total-box{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.resumen{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://petrocheck.com.ec/wp-content/uploads/2021/09/logo_oscuro.png">
</div>

<div class="total-box">Total: $<span id="total">0.00</span></div>

<!-- PASO 1 -->
<div class="step active" id="step1">
<h3 style="color:white">Servicios</h3>
<div class="grid" id="listaServicios"></div>
<div id="resumenBox" class="resumen"></div>
<button class="next" onclick="validar()">Siguiente</button>
</div>

<!-- PASO 2 -->
<div class="step" id="step2">
<h3 style="color:white">Ubicación</h3>
<input id="ubicacion" oninput="actualizarResumen()">

<div id="resumenBox2" class="resumen"></div>

<div class="botones">
<button class="back" onclick="next(1)">Atrás</button>
<button class="next" onclick="next(3)">Siguiente</button>
</div>
</div>

<!-- PASO 3 -->
<div class="step" id="step3">
<h3 style="color:white">Datos del cliente</h3>

<input id="razon" placeholder="Razón Social *">
<input id="ruc" placeholder="RUC *">
<input id="contacto" placeholder="Persona de contacto *">
<input id="telefono" placeholder="Teléfono *">
<input id="correo" placeholder="Correo electrónico *">

<div id="resumenBox3" class="resumen"></div>

<div class="botones">
<button class="back" onclick="next(2)">Atrás</button>
<button class="next" onclick="validarDatos()">Finalizar</button>
</div>
</div>

<!-- FINAL -->
<div class="step" id="step4">
<div id="resumenFinal" class="resumen"></div>
<button onclick="generarPDF()">📄 PDF</button>
<button onclick="enviarWhatsApp()">📲 WhatsApp</button>
</div>

</div>

<script>

/* SERVICIOS */
const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150],
["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90],
["PARÁMETROS DIMENSIONALES",59.5,70,85],
["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",382.5,450,460],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",297.5,350,380],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",408,480,500],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",153,180,200],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",365.5,430,490],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL HASTA (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",127.5,150,190],
["MEMORIA TÉCNICA",297.5,350,370],
["CERTIFICACIÓN DE SURTIDORES NTE INEN 1781",63.75,75,90],
["CUMPLIMIENTO DE NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465]
];

const cont=document.getElementById("listaServicios");

servicios.forEach((s,i)=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" id="check${i}" onchange="total(); actualizarResumen();">
<b>${s[0]}</b>

<div class="cantidad-box">
<button onclick="cambiarCantidad(${i}, -1)">-</button>
<input type="number" id="cant${i}" value="1" min="1"
oninput="total(); actualizarResumen();">
<button onclick="cambiarCantidad(${i}, 1)">+</button>
</div>

<span class="tag normal">Normal: $${s[3]}</span>
<span class="tag masgas">MasGas: $${s[2]}</span>
<span class="tag feria">Feria: $${s[1]}</span>
</div>`;
});

/* FUNCIONES */
function cambiarCantidad(i,c){
let input=document.getElementById("cant"+i);
let v=parseInt(input.value)||1;
v+=c;
if(v<1)v=1;
input.value=v;
total(); actualizarResumen();
}

function total(){
let t=0;
servicios.forEach((s,i)=>{
let check=document.getElementById("check"+i);
let cant=parseFloat(document.getElementById("cant"+i).value)||1;
if(check.checked)t+=s[1]*cant;
});
document.getElementById("total").innerText=t.toFixed(2);
}

/* 🔒 LOGISTICA ORIGINAL (NO TOCADA) */
function calcularLogistica(u){
u=u.toLowerCase();
if(u.includes("quito")) return 131;
if(u.includes("guayaquil")) return 147;
return 140;
}

function actualizarResumen(){

let normal=0, masgas=0, feria=0, lista=[];

servicios.forEach((s,i)=>{
let check=document.getElementById("check"+i);
let cant=parseFloat(document.getElementById("cant"+i).value)||1;

if(check.checked){
normal+=s[3]*cant;
masgas+=s[2]*cant;
feria+=s[1]*cant;
lista.push(`• ${s[0]} (Cantidad: ${cant})`);
}
});

let u=ubicacion.value;
let log=u?calcularLogistica(u):0;

normal+=log; masgas+=log; feria+=log;

let html=`
<h4>Resumen de Cotización</h4>

${lista.join("<br>") || "—"}<br><br>

<b>Ubicación:</b> ${u || "-"}<br>
<b>Logística:</b> $${log}<br><br>

<b>Total normal:</b> $${normal.toFixed(2)}<br>
<b>Total MasGas:</b> $${masgas.toFixed(2)}<br>
<b style="color:#f97316;">Total feria:</b> $${feria.toFixed(2)}<br><br>

<b style="color:#16a34a;">Ahorro:</b> $${(normal-feria).toFixed(2)}<br><br>

<b style="font-size:12px;color:#6b7280;">
La presente oferta tiene una validez de 15 días. Posterior a este plazo, los precios se ajustarán a tarifa MasGas.<br><br>
El costo logístico indicado corresponde a una tarifa por día de ejecución del servicio.
</b>
`;

document.querySelectorAll(".resumen").forEach(r=>r.innerHTML=html);
}

function validar(){
if(!document.querySelector("input[type=checkbox]:checked")){
alert("Selecciona servicio");return;
}
next(2);
}

function validarDatos(){
if(!razon.value||!ruc.value||!contacto.value||!telefono.value||!correo.value){
alert("Completa todos los datos");return;
}
next(4);
actualizarResumen();
}

function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
}

function generarPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();
doc.text("COTIZACIÓN PETROCHECK",10,10);
let texto=document.getElementById("resumenFinal").innerText;
let lineas=doc.splitTextToSize(texto,180);
doc.text(lineas,10,20);
doc.save("cotizacion.pdf");
}

function enviarWhatsApp(){
let datosCliente = `
DATOS DEL CLIENTE
Razón Social: ${razon.value}
RUC: ${ruc.value}
Persona de contacto: ${contacto.value}
Teléfono: ${telefono.value}
Correo: ${correo.value}

`;
let resumen=document.getElementById("resumenFinal").innerText;
let mensaje=datosCliente+"\n"+resumen;
window.open("https://wa.me/593999300398?text="+encodeURIComponent(mensaje));
}

</script>

</body>
</html>
