<!DOCTYPE html>
<html>
<head>
  <title>Cotizador Petrocheck</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 30px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .resultado {
      margin-top: 20px;
      background: #eaffea;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="box">

<h2>💰 Cotizador Petrocheck</h2>

<label>Servicio:</label>
<select id="servicio">
  <option value="102|150">Hermeticidad en tanques</option>
  <option value="63.75|90">Hermeticidad en líneas</option>
  <option value="59.5|85">Parámetros dimensionales</option>
  <option value="382.5|460">Limpieza de tanque</option>
</select>

<label>Zona:</label>
<select id="zona">
  <option value="131">Zona 1 (1 día)</option>
  <option value="131">Zona 2 (1 día)</option>
  <option value="147">Zona 3 (3 días)</option>
  <option value="131">Zona 4 (3 días)</option>
  <option value="140">Zona 5 (3 días)</option>
</select>

<button onclick="calcular()">Calcular Cotización</button>

<div class="resultado" id="resultado"></div>

<button onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>

</div>

<script>
let totalFinal = 0;
let mensajeFinal = "";

function calcular() {

  let datos = document.getElementById("servicio").value.split("|");

  let precioFeria = parseFloat(datos[0]);
  let precioNormal = parseFloat(datos[1]);
  let logistica = parseFloat(document.getElementById("zona").value);

  let total = precioFeria + logistica;
  let ahorro = precioNormal - precioFeria;

  totalFinal = total;

  mensajeFinal =
    "COTIZACIÓN PETROCHECK%0A" +
    "Servicio: " + document.getElementById("servicio").options[document.getElementById("servicio").selectedIndex].text + "%0A" +
    "Precio normal: $" + precioNormal + "%0A" +
    "Precio feria: $" + precioFeria + "%0A" +
    "Logística: $" + logistica + "%0A" +
    "TOTAL: $" + total.toFixed(2);

  document.getElementById("resultado").innerHTML =
    "<b>Precio feria:</b> $" + precioFeria +
    "<br><b>Logística:</b> $" + logistica +
    "<br><b>Total:</b> $" + total.toFixed(2) +
    "<br><b>Ahorro:</b> $" + ahorro.toFixed(2);
}

function enviarWhatsApp() {

  let numero = "593999300398"; // ← CAMBIA TU NÚMERO

  let url = "https://wa.me/" + numero + "?text=" + mensajeFinal;

  window.open(url, "_blank");
}
</script>

</body>
</html>
