<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck</title>

<style>

/* ===== PALETA PROFESIONAL ===== */
:root{
  --primary:#0b1f3a;
  --secondary:#123d6b;
  --accent:#00a86b;
  --light:#f5f7fa;
  --card:#ffffff;
  --text:#1e293b;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--light);
  color:var(--text);
}

/* ===== HEADER ===== */
header{
  background:linear-gradient(120deg,var(--primary),var(--secondary));
  color:white;
  padding:40px 20px;
  text-align:center;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

header h1{
  margin:0;
  font-size:28px;
  letter-spacing:1px;
}

header p{
  opacity:0.8;
}

/* ===== CONTENEDOR ===== */
.container{
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}

/* ===== TITULOS ===== */
h3{
  margin-top:30px;
  font-weight:600;
}

/* ===== GRID SERVICIOS ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

/* ===== TARJETAS ===== */
.card{
  background:var(--card);
  border-radius:14px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:all 0.25s ease;
  border:1px solid #e5e7eb;
  position:relative;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card input{
  transform:scale(1.2);
  margin-right:8px;
}

.card b{
  display:block;
  margin-bottom:5px;
}

/* ===== PRECIOS ===== */
.precios{
  font-size:13px;
  color:#64748b;
}

.precios span{
  display:block;
}

/* ===== SELECT ===== */
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-top:10px;
  font-size:15px;
}

/* ===== BOTONES ===== */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  margin-top:12px;
  cursor:pointer;
  transition:0.3s;
}

.btn-primary{
  background:var(--primary);
  color:white;
}

.btn-primary:hover{
  background:#08182d;
}

.btn-whatsapp{
  background:#25D366;
  color:white;
}

.btn-whatsapp:hover{
  background:#1ebe5d;
}

/* ===== RESULTADO ===== */
.resultado{
  margin-top:25px;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.resultado h4{
  margin-top:0;
}

.total{
  font-size:24px;
  font-weight:bold;
  color:var(--accent);
  margin-top:10px;
}

hr{
  margin:15px 0;
}

</style>
</head>

<body>

<header>
<h1>Cotizador Petrocheck</h1>
<p>Servicios técnicos certificados para estaciones de servicio</p>
</header>

<div class="container">

<h3>Selecciona los servicios:</h3>

<div class="grid" id="servicios">

<div class="card"><label><input type="checkbox" value="102|120|150"><b>Hermeticidad en tanques</b></label><div class="precios"><span>Normal: $150</span><span>MasGas: $120</span><span>Feria: $102</span></div></div>

<div class="card"><label><input type="checkbox" value="63.75|75|90"><b>Hermeticidad en líneas</b></label><div class="precios"><span>Normal: $90</span><span>MasGas: $75</span><span>Feria: $63.75</span></div></div>

<div class="card"><label><input type="checkbox" value="59.5|70|85"><b>Parámetros dimensionales</b></label><div class="precios"><span>Normal: $85</span><span>MasGas: $70</span><span>Feria: $59.5</span></div></div>

<div class="card"><label><input type="checkbox" value="382.5|450|460"><b>Limpieza de tanque</b></label><div class="precios"><span>Normal: $460</span><span>MasGas: $450</span><span>Feria: $382.5</span></div></div>

</div>

<h3>Ubicación:</h3>

<select id="ciudad">
<option value="pichincha">Quito / Pichincha</option>
<option value="ambato">Ambato</option>
<option value="guayaquil">Guayaquil</option>
<option value="cuenca">Cuenca</option>
<option value="amazonia">Amazonía</option>
</select>

<button class="btn-primary" onclick="calcular()">Calcular Cotización</button>

<div class="resultado" id="resultado"></div>

<button class="btn-whatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>

</div>

<script>

function obtenerLogistica(ciudad){
if(ciudad=="pichincha") return 131;
if(ciudad=="ambato") return 131;
if(ciudad=="guayaquil") return 147;
if(ciudad=="cuenca") return 131;
if(ciudad=="amazonia") return 140;
}

let mensaje="";

function calcular(){

let checks=document.querySelectorAll("#servicios input:checked");

let normal=0,masgas=0,feria=0;

checks.forEach(c=>{
let d=c.value.split("|");
feria+=parseFloat(d[0]);
masgas+=parseFloat(d[1]);
normal+=parseFloat(d[2]);
});

let ciudad=document.getElementById("ciudad").value;
let logistica=obtenerLogistica(ciudad);
let total=feria+logistica;

mensaje="COTIZACIÓN PETROCHECK%0A"+
"Total Normal: $"+normal+"%0A"+
"Total MasGas: $"+masgas+"%0A"+
"Total Feria: $"+feria+"%0A"+
"Logística: $"+logistica+"%0A"+
"TOTAL FINAL: $"+total;

document.getElementById("resultado").innerHTML=
"<h4>Resumen de Cotización</h4>"+
"Normal: $"+normal+
"<br>MasGas: $"+masgas+
"<br><b>Feria: $"+feria+"</b>"+
"<hr>Logística: $"+logistica+
"<div class='total'>TOTAL: $"+total+"</div>";
}

function enviarWhatsApp(){
let numero="59399930098";
window.open("https://wa.me/"+numero+"?text="+mensaje);
}

</script>

</body>
</html>
