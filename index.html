<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{ --accent:#f97316; }

body{
  margin:0;
  font-family:'Segoe UI';
  background:url('https://petrocheck.com.ec/wp-content/uploads/2021/11/calidad-home.jpg') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{max-width:1100px;margin:auto;padding:25px;}
.header{text-align:center;margin-bottom:20px;}
.header img{height:70px;}

.step{display:none;}
.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:16px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.cantidad-box{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:8px;
}
.cantidad-box button{
  width:30px;height:30px;
  background:#f97316;color:white;border:none;border-radius:6px;
  cursor:pointer;
}
.cantidad-box input{
  width:50px;text-align:center;border:1px solid #ccc;border-radius:6px;
}

.tag{display:block;font-size:13px;}
.normal{text-decoration:line-through;color:#aaa;}
.masgas{color:#555;}
.feria{background:#f97316;color:white;padding:3px;border-radius:5px;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.botones{display:flex;gap:10px;margin-top:15px;}
button{flex:1;padding:12px;border:none;border-radius:8px;cursor:pointer;}
.next{background:#f97316;color:white;}
.back{background:#ccc;}

.total-box{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.resumen{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://drive.google.com/file/d/1fbGMZqW9tL88TpdNOvxQj6_oNIdnutYu/view?usp=drive_link">
</div>

<div class="total-box">Total: $<span id="total">0.00</span></div>

<!-- PASO 1 -->
<div class="step active" id="step1">
<h3 style="color:white">Servicios</h3>
<div class="grid" id="listaServicios"></div>
<div id="resumenBox" class="resumen"></div>
<button class="next" onclick="validar()">Siguiente</button>
</div>

<!-- PASO 2 -->
<div class="step" id="step2">
<h3 style="color:white">Ubicación</h3>
<input id="ubicacion" list="ciudades" oninput="actualizarResumen()">

<datalist id="ciudades">
<option value="QUITO">
<option value="CAYAMBE">
<option value="AMBATO">
<option value="LATACUNGA">
<option value="RIOBAMBA">
<option value="GUAYAQUIL">
<option value="SANTO DOMINGO DE LOS TSACHILAS">
<option value="OTAVALO">
<option value="MEJIA">
<option value="TABACUNDO">
<option value="PORTOVIEJO">
<option value="MILAGRO">
<option value="BABAHOYO">
<option value="LOJA">
<option value="PUYO">
<option value="LAGO AGRIO">
<option value="PELILEO">
<option value="SALCEDO">
<option value="BAÑOS DE AGUA SANTA">
<option value="GUARANDA">
</datalist>

<div id="resumenBox2" class="resumen"></div>

<div class="botones">
<button class="back" onclick="next(1)">Atrás</button>
<button class="next" onclick="next(3)">Siguiente</button>
</div>
</div>

<!-- PASO 3 -->
<div class="step" id="step3">
<h3 style="color:white">Datos del cliente</h3>

<input id="razon" placeholder="Razón Social *">
<input id="ruc" placeholder="RUC *">
<input id="contacto" placeholder="Persona de contacto *">
<input id="telefono" placeholder="Teléfono *">
<input id="correo" placeholder="Correo electrónico *">

<div id="resumenBox3" class="resumen"></div>

<div class="botones">
<button class="back" onclick="next(2)">Atrás</button>
<button class="next" onclick="validarDatos()">Finalizar</button>
</div>
</div>

<!-- FINAL -->
<div class="step" id="step4">
<div id="resumenFinal" class="resumen"></div>
<button onclick="generarPDF()">📄 PDF</button>
<button onclick="enviarWhatsApp()">📲 WhatsApp</button>
</div>

</div>

<script>

/* SERVICIOS */
const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150],
["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90],
["PARÁMETROS DIMENSIONALES",59.5,70,85],
["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",382.5,450,460],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",297.5,350,380],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES",408,480,500],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES",153,180,200],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES",365.5,430,490],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL",127.5,150,190],
["MEMORIA TÉCNICA",297.5,350,370],
["CERTIFICACIÓN DE SURTIDORES NTE INEN 1781",63.75,75,90],
["CUMPLIMIENTO DE NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465]
];

const cont=document.getElementById("listaServicios");

servicios.forEach((s,i)=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" id="check${i}" onchange="total(); actualizarResumen();">
<b>${s[0]}</b>

<div class="cantidad-box">
<button onclick="cambiarCantidad(${i},-1)">-</button>
<input id="cant${i}" value="1">
<button onclick="cambiarCantidad(${i},1)">+</button>
</div>

<span class="tag normal">Normal: $${s[3]}</span>
<span class="tag masgas">MasGas: $${s[2]}</span>
<span class="tag feria">Feria: $${s[1]}</span>
</div>`;
});

/* LOGÍSTICA POR CIUDAD (CORRECTA) */
function calcularLogistica(u){
u=u.toLowerCase();

const zonas={
"quito":131,
"cayambe":131,
"tabacundo":131,
"otavalo":131,
"mejia":131,

"ambato":140,
"latacunga":140,
"salcedo":140,
"pelileo":140,
"baños":140,

"guayaquil":147,
"santo domingo":147,
"riobamba":147,
"babahoyo":147,
"milagro":147,
"portoviejo":147,
"guaranda":147,
"loja":147,
"puyo":147,
"lago agrio":147
};

for(let c in zonas){
if(u.includes(c)) return zonas[c];
}

return 140;
}

/* RESTO IGUAL */
function cambiarCantidad(i,c){
let x=document.getElementById("cant"+i);
let v=parseInt(x.value)||1;
v+=c;if(v<1)v=1;
x.value=v;total();actualizarResumen();
}

function total(){
let t=0;
servicios.forEach((s,i)=>{
let ch=document.getElementById("check"+i);
let c=parseInt(document.getElementById("cant"+i).value)||1;
if(ch.checked)t+=s[1]*c;
});
document.getElementById("total").innerText=t.toFixed(2);
}

function actualizarResumen(){

let normal=0,masgas=0,feria=0,lista=[];

servicios.forEach((s,i)=>{
let ch=document.getElementById("check"+i);
let c=parseInt(document.getElementById("cant"+i).value)||1;

if(ch.checked){
normal+=s[3]*c;
masgas+=s[2]*c;
feria+=s[1]*c;
lista.push(`• ${s[0]} x${c}`);
}
});

let u=ubicacion.value;
let log=calcularLogistica(u);

normal+=log; masgas+=log; feria+=log;

document.querySelectorAll(".resumen").forEach(r=>r.innerHTML=`
<h4>Resumen</h4>
${lista.join("<br>")}<br><br>
Ubicación: ${u}<br>
Logística: $${log}<br><br>
Total Feria: <b>$${feria.toFixed(2)}</b><br>
Ahorro: <b style="color:green">$${(normal-feria).toFixed(2)}</b>
`);
}

function validar(){
if(!document.querySelector("input[type=checkbox]:checked")) return alert("Selecciona servicio");
next(2);
}

function validarDatos(){
if(!razon.value||!ruc.value) return alert("Completa datos");
next(4);
actualizarResumen();
}

function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
}

function generarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text(document.getElementById("resumenFinal").innerText,10,10);
doc.save("cotizacion.pdf");
}

function enviarWhatsApp(){
let txt=document.getElementById("resumenFinal").innerText;
window.open("https://wa.me/593999300398?text="+encodeURIComponent(txt));
}

</script>

</body>
</html>
