<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{ --accent:#f97316; }

body{
  margin:0;
  font-family:'Segoe UI';
  background:url('https://petrocheck.com.ec/wp-content/uploads/2021/11/calidad-home.jpg') no-repeat center/cover;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

.container{max-width:1100px;margin:auto;padding:25px;}
.header{text-align:center;margin-bottom:20px;}
.header img{height:70px;}

.step{display:none;}
.active{display:block;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}

.card{
  background:white;
  padding:16px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  transition:.3s;
}
.card:hover{transform:translateY(-5px);}

.tag{display:block;font-size:13px;}
.normal{text-decoration:line-through;color:#aaa;}
.masgas{color:#555;}
.feria{background:#f97316;color:white;padding:3px;border-radius:5px;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.botones{display:flex;gap:10px;margin-top:15px;}
button{flex:1;padding:12px;border:none;border-radius:8px;cursor:pointer;}
.next{background:#f97316;color:white;}
.back{background:#ccc;}

.total-box{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.resumen{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="https://petrocheck.com.ec/wp-content/uploads/2021/09/logo_oscuro.png">
</div>

<div class="total-box">Total: $<span id="total">0.00</span></div>

<!-- PASO 1 -->
<div class="step active" id="step1">
<h3 style="color:white">Servicios</h3>
<div class="grid" id="listaServicios"></div>

<div id="resumenBox" class="resumen"></div>

<button class="next" onclick="validar()">Siguiente</button>
</div>

<!-- PASO 2 -->
<div class="step" id="step2">
<h3 style="color:white">Ubicación</h3>
<input id="ubicacion" list="ciudades" oninput="actualizarResumen()">

<datalist id="ciudades">
<option value="MEJIA"><option value="CAYAMBE"><option value="QUITO">
<option value="TABACUNDO"><option value="SANTO DOMINGO DE LOS TSACHILAS">
<option value="OTAVALO"><option value="PEDRO VICENTE MALDONADO">
<option value="SAN MIGUEL DE URCUQUI"><option value="CHUNCHI">
<option value="AMBATO"><option value="CUMANDA"><option value="PANGUA">
<option value="LATACUNGA"><option value="RIOBAMBA"><option value="PUJILI">
<option value="PELILEO"><option value="BUCAY"><option value="EL CORAZÓN">
<option value="SANTIAGO DE PILLARO"><option value="SALCEDO">
<option value="TISALEO"><option value="SIGCHOS"><option value="PENIPE">
<option value="CEVALLOS"><option value="BAÑOS DE AGUA SANTA">
<option value="QUERO"><option value="SAQUISILI"><option value="GUARANDA">
<option value="MOCACHE"><option value="GUAYAQUIL"><option value="BALAO">
<option value="EL CARMEN"><option value="BABAHOYO"><option value="NOBOL">
<option value="PORTOVIEJO"><option value="MILAGRO"><option value="JARAMIJO">
<option value="YAHUACHI"><option value="MONTECRISTI"><option value="PALENQUE">
<option value="SALITRE"><option value="SANTA LUCIA"><option value="URDANETA">
<option value="ECHEANDIA"><option value="CHILLANES"><option value="SANTA ISABEL">
<option value="CALVAS"><option value="CAÑAR"><option value="LOJA">
<option value="GUALACEO"><option value="PUCARA"><option value="NABON">
<option value="OÑA"><option value="YACUAMBI"><option value="PAUTE">
<option value="CATACOCHA"><option value="PASAJE"><option value="PORTOVELO">
<option value="EL GUABO"><option value="LAGO AGRIO"><option value="SUCUMBIOS">
<option value="PUYO"><option value="LORETO"><option value="JOYA DE LOS SACHAS">
</datalist>

<div id="resumenBox2" class="resumen"></div>

<div class="botones">
<button class="back" onclick="next(1)">Atrás</button>
<button class="next" onclick="next(3)">Siguiente</button>
</div>
</div>

<!-- PASO CALENDARIO -->
<div class="step" id="step3">
<h3 style="color:white">Fecha de ejecución</h3>
<input type="date" id="fechaServicio">

<div id="estadoFecha" style="color:white"></div>

<div class="botones">
<button class="back" onclick="next(2)">Atrás</button>
<button class="next" onclick="guardarFecha()">Confirmar</button>
</div>

<button onclick="resetearFechas()" style="background:red;color:white;margin-top:10px;">
🔒 Reset calendario
</button>

<div id="resumenBox3" class="resumen"></div>
</div>

<!-- PASO DATOS -->
<div class="step" id="step4">
<h3 style="color:white">Datos</h3>

<input id="razon" placeholder="Razón Social *">
<input id="ruc" placeholder="RUC *">
<input id="contacto" placeholder="Contacto *">
<input id="telefono" placeholder="Teléfono *">

<div id="resumenBox4" class="resumen"></div>

<div class="botones">
<button class="back" onclick="next(3)">Atrás</button>
<button class="next" onclick="validarDatos()">Finalizar</button>
</div>
</div>

<!-- FINAL -->
<div class="step" id="step5">
<div id="resumenFinal" class="resumen"></div>
<button onclick="generarPDF()">📄 PDF</button>
<button onclick="enviarWhatsApp()">📲 WhatsApp</button>
</div>

</div>

<script>

const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150],
["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90],
["PARÁMETROS DIMENSIONALES",59.5,70,85],
["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",382.5,450,460],
["LIMPIEZA DE TANQUE CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",297.5,350,380],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",408,480,500],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",153,180,200],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",365.5,430,490],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL HASTA (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",127.5,150,190],
["MEMORIA TÉCNICA",297.5,350,370],
["CERTIFICACIÓN DE SURTIDORES NTE INEN 1781",63.75,75,90],
["CUMPLIMIENTO DE NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465]
];

const cont=document.getElementById("listaServicios");

servicios.forEach(s=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" value="${s[1]}" onchange="total(); actualizarResumen();">
<b>${s[0]}</b>
<span class="tag normal">Normal: $${s[3]}</span>
<span class="tag masgas">MasGas: $${s[2]}</span>
<span class="tag feria">Feria: $${s[1]}</span>
</div>`;
});

/* TOTAL */
function total(){
let t=0;
document.querySelectorAll("input:checked").forEach(c=>t+=parseFloat(c.value));
document.getElementById("total").innerText=t.toFixed(2);
}

/* LOGISTICA */
function calcularLogistica(u){
u=u.toLowerCase();
if(u.includes("quito")) return 131;
if(u.includes("guayaquil")) return 147;
return 140;
}

let fechaSeleccionada="";

/* RESUMEN GLOBAL */
function actualizarResumen(){
let total=0, lista=[];

document.querySelectorAll("input:checked").forEach(c=>{
total+=parseFloat(c.value);
lista.push("• "+c.parentElement.querySelector("b").innerText);
});

let u=ubicacion.value;
let log=u ? calcularLogistica(u) : 0;

let resumen=`
<h4>Resumen</h4>
${lista.join("<br>") || "—"}<br><br>
Ubicación: ${u || "-"}<br>
Logística: $${log}<br>
Fecha: ${fechaSeleccionada || "-"}<br><br>
<b>Total: $${(total+log).toFixed(2)}</b>
`;

document.querySelectorAll(".resumen").forEach(r=>r.innerHTML=resumen);
}

/* CALENDARIO */
function guardarFecha(){
let f=fechaServicio.value;
let fechas=JSON.parse(localStorage.getItem("fechas")||"[]");

if(fechas.includes(f)){
estadoFecha.innerText="❌ Fecha ocupada";
return;
}

fechas.push(f);
localStorage.setItem("fechas",JSON.stringify(fechas));

fechaSeleccionada=f;
actualizarResumen();
next(4);
}

function resetearFechas(){
let c=prompt("Clave:");
if(c==="petrocheck123"){
localStorage.removeItem("fechas");
alert("Reset OK");
}
}

/* VALIDACIONES */
function validar(){
if(!document.querySelector("input:checked")){
alert("Selecciona servicio"); return;
}
next(2);
}

function validarDatos(){
if(!razon.value || !ruc.value || !contacto.value || !telefono.value){
alert("Completa datos"); return;
}
next(5);
actualizarResumen();
}

/* NAVEGACION */
function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("step"+n).classList.add("active");
}

/* PDF */
function generarPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

doc.text("COTIZACIÓN PETROCHECK",10,10);
doc.text(document.getElementById("resumenFinal").innerText,10,20);

doc.save("cotizacion.pdf");
}

/* WHATSAPP */
function enviarWhatsApp(){
let txt=document.getElementById("resumenFinal").innerText;
window.open("https://wa.me/593999300398?text="+encodeURIComponent(txt));
}

</script>

</body>
</html>
</script>

</body>
</html>
