```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cotizador Petrocheck PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:sans-serif;background:#f8fafc;margin:0;}
.container{max-width:1000px;margin:auto;padding:20px;}
.card{border:1px solid #ddd;padding:10px;border-radius:8px;margin-bottom:10px;}
button{padding:10px;margin-top:10px;border:none;border-radius:6px;cursor:pointer;}
.next{background:#f97316;color:white;}
.back{background:#ddd;}
</style>
</head>

<body>

<div class="container">

<h2>Servicios</h2>
<div id="listaServicios"></div>

<button class="next" onclick="validar()">Siguiente</button>

<div id="step2" style="display:none;">
<h3>Ubicación</h3>
<input id="ubicacion" placeholder="Ej: Quito">
<button class="next" onclick="mostrarResumen()">Continuar</button>
</div>

<div id="step3" style="display:none;">
<h3>Resumen</h3>
<div id="resumen"></div>

<button onclick="generarPDF()">📄 Descargar PDF</button>
<button onclick="enviarWhatsApp()">📲 Enviar WhatsApp</button>
</div>

</div>

<script>

const servicios = [
["PRUEBAS DE HERMETICIDAD EN TANQUES",102,120,150],
["PRUEBAS DE HERMETICIDAD EN LÍNEAS",63.75,75,90],
["PARÁMETROS DIMENSIONALES",59.5,70,85],
["INSPECCIÓN TÉCNICA POR MEDICIÓN DE ESPESORES",59.5,70,85],
["LIMPIEZA  DE TANQUE CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES  (INCLUYE CERTIFICADO DE LIMPIEZA)",382.5,450,460],
["LIMPIEZA  DE TANQUE CON CAPACIDAD  DE 1 MIL HASTA 4 MIL GALONES (INCLUYE CERTIFICADO DE LIMPIEZA)",297.5,350,380],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES  (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",408,480,500],
["CALIBRACIÓN LIQUIDA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL GALONES (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",153,180,200],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 5 MIL HASTA 12 MIL GALONES  (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",365.5,430,490],
["CALIBRACIÓN GEOMETRICA TANQUES CON CAPACIDAD DE 1 MIL HASTA 4 MIL HASTA (INCLUYE VARILLA DE AFORO REGLETADA EN CM)",127.5,150,190],
["MEMORIA TÉCNICA",297.5,350,370],
["CERTIFICACIÓN DE SURTIDORES NTE INEN 1781",63.75,75,90],
["CUMPLIMIENTO DE NORMAS DE SEGURIDAD NTE INEN 2251",382.5,450,465]
];

const cont = document.getElementById("listaServicios");

servicios.forEach((s,i)=>{
cont.innerHTML+=`
<div class="card">
<input type="checkbox" id="s${i}">
<b>${s[0]}</b><br>
Normal: $${s[3]} | MasGas: $${s[2]} | Feria: $${s[1]}
</div>`;
});

function validar(){
if(document.querySelectorAll("input[type=checkbox]:checked").length==0){
alert("Selecciona al menos un servicio");
return;
}
document.getElementById("step2").style.display="block";
}

function calcularLogistica(u){
u=u.toLowerCase();
if(u.includes("quito")) return 131;
if(u.includes("guayaquil")) return 147;
return 140;
}

function obtenerDatos(){

let lista=[];
let normal=0, masgas=0, feria=0;

servicios.forEach((s,i)=>{
let chk=document.getElementById("s"+i);
if(chk.checked){
lista.push(s[0]);
feria+=s[1];
masgas+=s[2];
normal+=s[3];
}
});

let u=document.getElementById("ubicacion").value;
let log=0;

if(u){
log=calcularLogistica(u);
normal+=log;
masgas+=log;
feria+=log;
}

return {lista,normal,masgas,feria,log};
}

function mostrarResumen(){
let d=obtenerDatos();

document.getElementById("step3").style.display="block";

document.getElementById("resumen").innerHTML=`
${d.lista.join("<br>")}<br><br>
Logística: $${d.log}<br><br>
Normal: $${d.normal.toFixed(2)}<br>
MasGas: $${d.masgas.toFixed(2)}<br>
<b>Feria: $${d.feria.toFixed(2)}</b><br><br>
Ahorro: $${(d.normal-d.feria).toFixed(2)}
`;
}

// ================= PDF =================
async function generarPDF(){

const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let d=obtenerDatos();

let y=10;

doc.text("COTIZACIÓN PETROCHECK",10,y);
y+=10;

d.lista.forEach(s=>{
doc.text("- "+s,10,y);
y+=6;
});

y+=5;
doc.text("Logística: $"+d.log,10,y); y+=6;
doc.text("Total normal: $"+d.normal.toFixed(2),10,y); y+=6;
doc.text("Total MasGas: $"+d.masgas.toFixed(2),10,y); y+=6;
doc.text("Total feria: $"+d.feria.toFixed(2),10,y); y+=6;
doc.text("Ahorro: $"+(d.normal-d.feria).toFixed(2),10,y);

doc.save("cotizacion.pdf");
}

// ================= WHATSAPP =================
function enviarWhatsApp(){
let d=obtenerDatos();

let msg="COTIZACIÓN PETROCHECK\n\n";
msg+=d.lista.join("\n")+"\n\n";
msg+="Total Feria: $"+d.feria.toFixed(2);

window.open("https://wa.me/593XXXXXXXXX?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
```
